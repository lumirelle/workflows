name: CI

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      os-matrix:
        required: false
        type: string
        default: '"ubuntu-slim", "macos-latest", "windows-latest"'

      runtime-versions:
        required: false
        type: string
        default: '"node@22", "node@24", "node@26"'

      check:
        required: false
        type: string
        default: mise run check

      test:
        required: false
        type: string
        default: mise run test

      debug:
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ${{ inputs.primary-os }}
    steps:
      - name: Setup mise
        uses: lumirelle/workflows/setup-mise@v10

      - name: Check
        run: ${{ inputs.check }}

  test:
    strategy:
      matrix:
        os: ${{ fromJson(format('[{0}]', inputs.os-matrix)) }}
        runtime: ${{ fromJson(format('[{0}]', inputs.runtime-versions)) }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup mise
        uses: lumirelle/workflows/setup-mise@v10
        with:
          debug: ${{ inputs.debug }}

      - name: Convert runtime version
        id: runtime
        run: |
          echo "mise_version=$(echo '${{ matrix.runtime }}' | sed -E 's/([a-z]+)@([^@]+)/\1 = \\"\2\\"/')" >> "$GITHUB_OUTPUT"

      - name: Setup ${{ matrix.runtime }} via local mise config
        shell: bash
        run: |
          set -e
          echo "[tools]
            ${{ steps.runtime.outputs.mise_version }}
          " > mise.local.toml

          if [[ ${{ inputs.debug }} == 'true' ]]; then
            echo "Content of mise.local.toml:"
            cat mise.local.toml
            MISE_DEBUG=1 mise install
          else
            mise install
          fi

      - name: Test
        run: ${{ inputs.test }}

name: CI

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      os-matrix:
        required: false
        type: string
        default: '"ubuntu-slim", "macos-latest", "windows-latest"'

      runtime-versions:
        required: false
        type: string
        default: '"bun = \\\"latest\\\""'

      skip-check:
        required: false
        type: boolean
        default: false

      package-manager:
        required: false
        type: string
        default: bun

      check:
        required: false
        type: string
        default: run check --if-present

      test:
        required: false
        type: string
        default: run test --if-present

      debug:
        required: false
        type: boolean
        default: false

jobs:
  check:
    if: ${{ !inputs.skip-check }}
    runs-on: ${{ inputs.primary-os }}
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@v6
        with:
          package-manager: ${{ inputs.package-manager }}

      - name: Check
        if: ${{ inputs.check != '' }}
        run: ${{ inputs.package-manager }} ${{ inputs.check }}

  test:
    strategy:
      matrix:
        os: ${{ fromJson(format('[{0}]', inputs.os-matrix)) }}
        runtime: ${{ fromJson(format('[{0}]', inputs.runtime-versions)) }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@v6
        with:
          mise-local-config: |
            [tools]
            ${{ matrix.runtime }}
          package-manager: ${{ inputs.package-manager }}
          debug: ${{ inputs.debug }}

      - name: Test
        if: ${{ inputs.test != '' }}
        run: ${{ inputs.package-manager }} ${{ inputs.test }}

name: CI

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      os-matrix:
        required: false
        type: string
        default: '"ubuntu-slim", "macos-latest", "windows-latest"'

      runtime-versions:
        required: false
        type: string
        default: '"bun = \\\"latest\\\""'

      check:
        required: false
        type: string
        default: mise run check

      test:
        required: false
        type: string
        default: mise run test

      debug:
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ${{ inputs.primary-os }}
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@main

      - name: Check
        run: ${{ inputs.check }}

  test:
    strategy:
      matrix:
        os: ${{ fromJson(format('[{0}]', inputs.os-matrix)) }}
        runtime: ${{ fromJson(format('[{0}]', inputs.runtime-versions)) }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@main
        with:
          mise-local-config-tools: ${{ matrix.runtime }}
          debug: ${{ inputs.debug }}

      - name: Test
        run: ${{ inputs.test }}

name: Release Commit

on:
  workflow_call:
    inputs:
      debug:
        required: false
        type: boolean
        default: false

      build:
        required: false
        type: string
        default: mise run build

      publish:
        required: false
        type: boolean
        default: false

      workspace-style:
        required: false
        type: string
        default: bun

      compact:
        required: false
        type: boolean
        default: false

      packages:
        required: false
        type: string
        default: ''

jobs:
  release-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Mise
        id: setup-mise
        uses: lumirelle/workflows/setup-mise@v7
        with:
          mise-local-config-tools: \"npm:pkg-pr-new\" = \"latest\"
          debug: ${{ inputs.debug }}

      - name: Build
        run: ${{ inputs.build }}

      - name: Publish
        if: ${{ inputs.publish }}
        run: pkg-pr-new publish ${{ inputs.workspace-style && format('--{0}', inputs.workspace-style) || '' }} ${{ inputs.compact && '--compact' || '' }} ${{ inputs.packages }}

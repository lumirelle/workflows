name: Release Commit

on:
  workflow_call:
    inputs:
      debug:
        required: false
        type: boolean
        default: false

      build:
        required: false
        type: string
        default: mise run build

      publish:
        required: false
        type: string
        default: mise run publish-commit

jobs:
  release-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup mise
        id: setup-mise
        uses: lumirelle/workflows/setup-mise@v10
        with:
          debug: ${{ inputs.debug }}

      - name: Build
        run: ${{ inputs.build }}

      - name: Publish
        run: ${{ inputs.publish }}

name: autofix.ci

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      package-manager:
        required: false
        type: string
        default: bun

      fix:
        required: false
        type: string
        default: run lint:fix --if-present

      debug:
        required: false
        type: boolean
        default: false

jobs:
  autofix-bun:
    runs-on: ${{ inputs.primary-os }}
    permissions:
      contents: read
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@main
        with:
          package-manager: ${{ inputs.package-manager }}
          frozen-lockfile: false
          debug: ${{ inputs.debug }}

      - name: Fix
        if: ${{ inputs.fix != '' }}
        run: ${{ inputs.package-manager }} ${{ inputs.fix }}

      - name: Commit
        uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8 # v1.3.3

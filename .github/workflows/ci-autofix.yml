name: autofix.ci

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      fix:
        required: false
        type: string
        default: mise run fix

      debug:
        required: false
        type: boolean
        default: false

jobs:
  autofix-bun:
    runs-on: ${{ inputs.primary-os }}
    permissions:
      contents: read
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@v9
        with:
          debug: ${{ inputs.debug }}

      - name: Fix
        run: ${{ inputs.fix }}

      - name: Commit
        uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4

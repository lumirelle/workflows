name: CI Coverage

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      package-manager:
        required: false
        type: string
        default: bun

      test:
        required: false
        type: string
        default: run test --coverage --if-present

      debug:
        required: false
        type: boolean
        default: false

jobs:
  coverage:
    runs-on: ${{ inputs.primary-os }}
    permissions:
      id-token: write
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@main
        with:
          package-manager: ${{ inputs.package-manager }}
          debug: ${{ inputs.debug }}

      - name: Test
        if: ${{ inputs.test != '' }}
        run: ${{ inputs.package-manager }} ${{ inputs.test }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

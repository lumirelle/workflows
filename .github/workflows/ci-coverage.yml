name: CI Coverage

on:
  workflow_call:
    inputs:
      primary-os:
        required: false
        type: string
        default: ubuntu-slim

      test:
        required: false
        type: string
        default: mise run test --coverage

      debug:
        required: false
        type: boolean
        default: false

jobs:
  coverage:
    runs-on: ${{ inputs.primary-os }}
    permissions:
      id-token: write
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@v9
        with:
          debug: ${{ inputs.debug }}

      - name: Test
        run: ${{ inputs.test }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

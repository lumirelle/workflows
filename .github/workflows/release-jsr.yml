name: Release JSR

on:
  workflow_call:
    inputs:
      debug:
        required: false
        type: boolean
        default: false

      build:
        required: false
        type: string
        default: mise run build

      publish:
        required: false
        type: boolean
        default: false

      dry-run:
        required: false
        type: boolean
        default: false

jobs:
  release-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Mise
        id: setup-mise
        uses: lumirelle/workflows/setup-mise@main
        with:
          mise-local-config-tools: \"npm:jsr\" = \"latest\"
          debug: ${{ inputs.debug }}

      - name: Build
        run: ${{ inputs.build }}

      - name: Publish
        if: ${{ inputs.publish }}
        run: jsr publish ${{ inputs.dry-run && '--dry-run' || '' }}

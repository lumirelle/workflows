name: Release JSR

on:
  workflow_call:
    inputs:
      package-manager:
        required: false
        type: string
        default: bun

      build:
        required: false
        type: string
        default: run build

      publish:
        required: false
        type: boolean
        default: false

      debug:
        required: false
        type: boolean
        default: false

jobs:
  release-jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@v6
        with:
          mise-local-config: |
            [tools]
            \"npm:jsr\" = \"latest\"
          package-manager: ${{ inputs.package-manager }}
          debug: ${{ inputs.debug }}

      - name: Debug
        if: ${{ inputs.debug }}
        shell: bash
        run: |
          set -e
          cat mise.local.toml
          which mise
          mise --version
          mise doctor
          which ${{ inputs.package-manager }}
          ${{ inputs.package-manager }} --version
          which jsr
          jsr --version

      - name: Build
        if: ${{ inputs.build != '' && inputs.publish }}
        run: ${{ inputs.package-manager }} ${{ inputs.build }}

      - name: Publish
        if: ${{ inputs.publish }}
        run: jsr publish

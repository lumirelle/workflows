name: Release

on:
  workflow_call:
    inputs:
      changelog:
        required: false
        type: boolean
        default: true

      package-manager:
        required: false
        type: string
        default: bun

      build:
        required: false
        type: string
        default: run build

      publish:
        required: false
        type: boolean
        default: false

      # This only works for Bun, as it has no `-r` option.
      packages:
        required: false
        type: string
        default: .

      tag:
        required: false
        type: string
        default: latest

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup Mise
        uses: lumirelle/workflows/setup-mise@main
        with:
          mise-local-config: |
            [tools]
            \"npm:changelogithub\" = \"latest\"
          package-manager: ${{ inputs.package-manager }}
          fetch-all: true
          debug: ${{ inputs.debug }}

      - name: Debug
        if: ${{ inputs.debug }}
        shell: bash
        run: |
          set -e
          which mise
          cat mise.local.toml
          mise --version
          mise doctor
          which ${{ inputs.package-manager }}
          ${{ inputs.package-manager }} --version
          which changelogithub
          changelogithub --version

      - name: Generate GitHub Changelog
        if: ${{ inputs.changelog }}
        run: changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: ${{ inputs.build != '' }}
        run: ${{ inputs.package-manager }} ${{ inputs.build }}

      - name: Publish To NPM (Bun)
        if: ${{ inputs.package-manager == 'bun' && inputs.publish }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          raw_packages='${{ inputs.packages }}'
          # Support values like: ., ./packages/*, ".", "./packages/*", and comma/space-separated forms.
          normalized_packages="$raw_packages"
          normalized_packages="${normalized_packages//,/ }"
          normalized_packages="${normalized_packages//\"/}"
          normalized_packages="${normalized_packages//\'/}"
          read -r -a package_patterns <<< "$normalized_packages"

          if [[ ${#package_patterns[@]} -eq 0 ]]; then
            echo "No packages provided."
            exit 1
          fi

          declare -a packages=()
          declare -A seen=()
          for pattern in "${package_patterns[@]}"; do
            matched=( $pattern )
            if [[ ${#matched[@]} -eq 0 ]]; then
              echo "No package matched pattern: $pattern"
              exit 1
            fi

            for package in "${matched[@]}"; do
              if [[ ! -d "$package" ]]; then
                echo "Skipping non-directory match: $package"
                continue
              fi
              if [[ -z "${seen[$package]+x}" ]]; then
                seen[$package]=1
                packages+=("$package")
              fi
            done
          done

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No package directories resolved from: $raw_packages"
            exit 1
          fi

          for package in "${packages[@]}"; do
            (
              echo "Publishing package: $package"
              cd "$package"
              ${{ inputs.package-manager }} pm pack --filename "$package/release.tgz"
              npm publish ./release.tgz --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
            )
          done

      - name: Publish To NPM (PNPM)
        if: ${{ inputs.package-manager == 'pnpm' && inputs.publish }}
        run: ${{ inputs.package-manager }} publish --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}

name: Release

on:
  workflow_call:
    inputs:
      runtime:
        required: false
        type: string
        default: bun

      changelog:
        required: false
        type: boolean
        default: true

      build:
        required: false
        type: string
        default: nr build

      publish:
        required: false
        type: boolean
        default: false

      # This only works for Bun, as it has no `-r` option.
      packages:
        required: false
        type: string
        default: .

      tag:
        required: false
        type: string
        default: latest

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup Bun
        if: ${{ inputs.runtime == 'bun' }}
        uses: lumirelle/workflows/setup-bun@v4
        with:
          fetch-all: true
          install-npm: true

      - name: Setup Node
        if: ${{ inputs.runtime == 'node' }}
        uses: lumirelle/workflows/setup-node@v4
        with:
          fetch-all: true

      - name: Generate GitHub Changelog
        if: ${{ inputs.changelog }}
        run: nlx -b changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Build
        if: ${{ inputs.build != '' && inputs.publish }}
        run: ${{ inputs.build }}

      - name: Publish (Bun) To NPM
        if: ${{ inputs.runtime == 'bun' && inputs.publish }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          raw_packages='${{ inputs.packages }}'
          # Support values like: ., ./packages/*, ".", "./packages/*", and comma/space-separated forms.
          normalized_packages="$raw_packages"
          normalized_packages="${normalized_packages//,/ }"
          normalized_packages="${normalized_packages//\"/}"
          normalized_packages="${normalized_packages//\'/}"
          read -r -a package_patterns <<< "$normalized_packages"

          if [[ ${#package_patterns[@]} -eq 0 ]]; then
            echo "No packages provided."
            exit 1
          fi

          declare -a packages=()
          declare -A seen=()
          for pattern in "${package_patterns[@]}"; do
            matched=( $pattern )
            if [[ ${#matched[@]} -eq 0 ]]; then
              echo "No package matched pattern: $pattern"
              exit 1
            fi

            for package in "${matched[@]}"; do
              if [[ ! -d "$package" ]]; then
                echo "Skipping non-directory match: $package"
                continue
              fi
              if [[ -z "${seen[$package]+x}" ]]; then
                seen[$package]=1
                packages+=("$package")
              fi
            done
          done

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No package directories resolved from: $raw_packages"
            exit 1
          fi

          for package in "${packages[@]}"; do
            (
              echo "Publishing package: $package"
              cd "$package"
              na pm pack --filename "$package/release.tgz"
              npm publish ./release.tgz --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
            )
          done

      - name: Publish (Node) To NPM
        if: ${{ inputs.runtime == 'node' && inputs.publish }}
        run: na -r publish --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}

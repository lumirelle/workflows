name: Release

on:
  workflow_call:
    inputs:
      changelog:
        required: false
        type: boolean
        default: true

      build:
        required: false
        type: string
        default: mise run build

      publish:
        required: false
        type: boolean
        default: false

      # This only works for Bun, as it has no `-r` option.
      packages:
        required: false
        type: string
        default: .

      tag:
        required: false
        type: string
        default: latest

      debug:
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup Mise
        id: setup-mise
        uses: lumirelle/workflows/setup-mise@v6
        with:
          mise-local-config-tools: \"npm:changelogithub\" = \"latest\"
          fetch-all: true
          debug: ${{ inputs.debug }}

      - name: Debug
        if: ${{ inputs.debug }}
        env:
          PACKAGE_MANAGER_NAME: ${{ steps.setup-mise.outputs.PACKAGE_MANAGER_NAME }}
        shell: bash
        run: |
          set -e

          echo "Mise local config:"
          cat mise.local.toml

          echo "Mise info:"
          which mise
          mise --version
          mise doctor

          echo "Package manager info:"
          which ${{ env.PACKAGE_MANAGER_NAME }}
          ${{ env.PACKAGE_MANAGER_NAME }} --version

          echo "changelogithub info:"
          which changelogithub
          changelogithub --version

      - name: Generate GitHub Changelog
        if: ${{ inputs.changelog }}
        run: changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: ${{ inputs.build != '' }}
        run: ${{ inputs.build }}

      - name: Publish To NPM
        if: ${{ inputs.publish }}
        env:
          PACKAGE_MANAGER_NAME: ${{ steps.setup-mise.outputs.PACKAGE_MANAGER_NAME }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [[ "${{ env.PACKAGE_MANAGER_NAME }}" != "bun" ]]; then
            echo "This project uses ${PACKAGE_MANAGER_NAME}, publishing with it."
            ${{ env.PACKAGE_MANAGER_NAME }} publish --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
          else
            echo "This project uses Bun, resolving packages from: ${{ inputs.packages }} and publishing with npm."
            raw_packages='${{ inputs.packages }}'
            # Support values like: ., ./packages/*, ".", "./packages/*", and comma/space-separated forms.
            normalized_packages="$raw_packages"
            normalized_packages="${normalized_packages//,/ }"
            normalized_packages="${normalized_packages//\"/}"
            normalized_packages="${normalized_packages//\'/}"
            read -r -a package_patterns <<< "$normalized_packages"

            if [[ ${#package_patterns[@]} -eq 0 ]]; then
              echo "No packages provided."
              exit 1
            fi

            declare -a packages=()
            declare -A seen=()
            for pattern in "${package_patterns[@]}"; do
              matched=( $pattern )
              if [[ ${#matched[@]} -eq 0 ]]; then
                echo "No package matched pattern: $pattern"
                exit 1
              fi

              for package in "${matched[@]}"; do
                if [[ ! -d "$package" ]]; then
                  echo "Skipping non-directory match: $package"
                  continue
                fi
                if [[ -z "${seen[$package]+x}" ]]; then
                  seen[$package]=1
                  packages+=("$package")
                fi
              done
            done

            if [[ ${#packages[@]} -eq 0 ]]; then
              echo "No package directories resolved from: $raw_packages"
              exit 1
            fi

            for package in "${packages[@]}"; do
              (
                echo "Publishing package: $package"
                cd "$package"
                ${{ env.PACKAGE_MANAGER_NAME }} pm pack --filename "$package/release.tgz"
                npm publish ./release.tgz --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
              )
            done
          fi

[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.build]
run = "echo 'Build completed!'"

[tasks."lint:oxlint"]
run = "aubr lint:oxlint"

[tasks."lint:eslint"]
wait_for = "lint:oxlint"
run = "aubr lint:eslint"

[tasks.lint]
depends = [
  "lint:oxlint",
  "lint:eslint"
]

[tasks."lint:fix:oxlint"]
run = "aubr lint:fix:oxlint"

[tasks."lint:fix:eslint"]
wait_for = "lint:fix:oxlint"
run = "aubr lint:fix:eslint"

[tasks."lint:fix"]
depends = [
  "lint:fix:oxlint",
  "lint:fix:eslint"
]

[tasks.typecheck]
run = "echo 'Type check successful!'"

[tasks.unused]
run = "echo 'Unused check successful!'"

[tasks.check]
depends = [
  "typecheck",
  "lint",
  "unused"
]

[tasks.test]
run = "echo 'Tests passed!'"

[tasks.prerelease]
depends = [
  "check",
  "test"
]

[tasks.release]
depends = "prerelease"
run = "aubr release"
raw = true
depends_post = "postrelease"

[tasks.postrelease]
run = "bun run ./release.sh"
